<style>

    --bad:var(--color-bad-law); --bad-bg:var(--color-bad-law-bg); --bad-bd:#E7A3A3;
    --userbg:var(--color-brand-navy); --userfg:#FFFFFF; --scrim:rgba(0,0,0,.5);
    --nyaya-brand:var(--color-brand-navy); --nyaya-gold:var(--color-brand-gold); --nyaya-gold-soft:#FBF6EC;
  }
  [data-theme="dark"]{
    --color-canvas:#14181F; --color-surface:#1B2029; --color-surface-raised:#20262F;
    --color-ink:#F1EEE8; --color-ink-secondary:#B8B2A9; --color-ink-tertiary:#847E75;

  @keyframes nyDot{0%,80%,100%{opacity:.25}40%{opacity:1}}

  .mono{font-family:var(--font-mono)}

/* ---------- tiny DOM helpers ---------- */
const el = (t,a={},...kids)=>{ const n=document.createElement(t);

    else if(k.startsWith("on")) n.addEventListener(k.slice(2).toLowerCase(),a[k]);

  for(const c of kids.flat()){ if(c==null||c===false)continue; n.append(c.nodeType?c:document.createTextNode(c)); }
  return n; };
const ICON=(p,o={})=>{ const s=`<svg width="${o.w||16}" height="${o.w||16}" viewBox="0 0 24 24" fill="${o.fill||'none'}" stroke="${o.stroke||'currentColor'}" stroke-width="${o.sw||1.8}" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
  const d=el("span",{style:"display:inline-flex;flex:none"}); d.innerHTML=s; return d.firstChild; };
const I={
  scales:'<path d="M12 3v18"/><path d="m5 7 7-2 7 2"/><path d="M5 7 2.5 14a3.5 3.5 0 0 0 7 0L7 7"/><path d="m17 7-2.5 7a3.5 3.5 0 0 0 7 0L19 7"/><path d="M5 21h14"/>',

  shield:'<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>',
  graph:'<circle cx="12" cy="5" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/><path d="M6.5 17.5 10.5 7"/><path d="m13.5 7 4 10.5"/><path d="M7 19h10"/>',

  thumbUp:'<path d="M7 10v12"/><path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2a3.13 3.13 0 0 1 3 3.88Z"/>',
  thumbDown:'<path d="M17 14V2"/><path d="M9 18.12 10 14H4.17a2 2 0 0 1-1.92-2.56l2.33-8A2 2 0 0 1 6.5 2H20a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-2.76a2 2 0 0 0-1.79 1.11L12 22a3.13 3.13 0 0 1-3-3.88Z"/>',

/* ---------- API ---------- */
async function jget(path){
  const r=await fetch(API+path);
  if(!r.ok){
    let detail=""; try{ const body=await r.json(); detail=body.error||body.detail||""; }catch(e){}
    throw new Error("HTTP "+r.status+(detail?": "+detail:""));
  }
  return r.json();
}

async function loadSidebar(){
  try{
    const [sess] = await Promise.all([
      jget("/sessions/"+S.userId)
    ]);
    S.sessions = sess.sessions||[];
  }catch(e){ S.sessions=[]; }
  render();
}

/* ---------- streaming chat ---------- */
async function send(text){
  text = (text!=null?text:S.draft).trim();
  if(!text || S.streaming) return;
  if(!S.sessionId) S.sessionId = "s_"+Math.random().toString(36).slice(2,12);
  S.draft="";
  S.messages.push({role:"user", text});
  const asst = {role:"assistant", text:"", parts:null, thinking:true, recalled:[], done:false,
                sources:[], warnings:[], verified:[]};
  S.messages.push(asst);
  S.streaming=true; render(); scrollThread();

  try{
    const resp = await fetch(API+"/chat",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({user_id:S.userId, session_id:S.sessionId, message:text})});
    const reader = resp.body.getReader(); const dec=new TextDecoder(); let buf="";
    while(true){
      const {value,done}=await reader.read(); if(done)break;
      buf += dec.decode(value,{stream:true});
      let nl; while((nl=buf.indexOf("\n"))>=0){
        const line=buf.slice(0,nl).trim(); buf=buf.slice(nl+1);
        if(!line)continue; let ev; try{ev=JSON.parse(line);}catch(e){continue;}
        handleEvent(ev, asst);
      }
    }
  }catch(e){ asst.text+="\n\n[connection error: "+e.message+"]"; }
  asst.thinking=false; asst.done=true; S.streaming=false;
  render(); scrollThread();
  loadSidebar();        // refresh sessions list after first turn
  refreshGraphForSelection();
}

function handleEvent(ev, asst){
  if(ev.type==="meta"){ S.sessionId=ev.session_id; asst.recalled=ev.recalled||[]; asst.thinking=true; }
  else if(ev.type==="sources"){
    S.sources=ev.sources||[];
    S.selectedJudgment=null; S.judgmentAskAnswer=""; S.judgmentAskDraft="";
    if(S.sources.length)S.selectedSource=sourceId(S.sources[0]);
  }
  else if(ev.type==="token"){ asst.thinking=false; asst.text+=ev.text; }
  else if(ev.type==="final"){
    asst.text=ev.answer; asst.sources=ev.sources||[]; asst.warnings=ev.warnings||[];
    asst.verified=ev.verified||[]; S.warnings=ev.warnings||[];
    if(ev.memory) S.memory=ev.memory;
    if(asst.recalled&&asst.recalled.length){ S.pulse=true; setTimeout(()=>{S.pulse=false;render();},1800); }
  }
  render(); scrollThread();
}

function scrollThread(){ const t=document.getElementById("thread"); if(t)requestAnimationFrame(()=>t.scrollTop=t.scrollHeight); }

/* ---------- answer formatting: citations + paragraphs + trust ---------- */
function srcByCitation(label){
  const norm=s=>(s||"").toLowerCase().replace(/[^a-z0-9 ]/g," ").replace(/\s+/g," ").trim();
  const left=norm(label.split(/ v\.? /)[0]);
  let best=null,bs=0;
  for(const s of S.sources){ const t=norm(s.case_title);
    let sc=0; if(left.length>5 && t.includes(left)) sc=0.95;
    if(sc>bs){bs=sc;best=s;} }
  return bs>0.6?best:null;
}
/* Section 5: lightweight Markdown — ## → h2, **bold** → strong, - / * → <ul>,
   while still tokenizing [Case citations] into interactive pills. */
function inlineInto(container, text, unver, reg){
  const tokenRe=/(\*\*[^*]+\*\*|\[[^\]]+\])/g; let last=0,m;
  while((m=tokenRe.exec(text))){
    if(m.index>last) container.append(document.createTextNode(text.slice(last,m.index)));
    const tok=m[0];
    if(tok.startsWith("**")){ container.append(el("strong",{},tok.slice(2,-2))); }
    else {
      const label=tok.slice(1,-1).trim();
      const looksCite=/ v\.? | vs /i.test(label) || /\b(19|20)\d{2}\b/.test(label);
      if(looksCite) container.append(citeRef(label, unver.has(label.toLowerCase()), reg));
      else container.append(document.createTextNode(tok));
    }
    last=tokenRe.lastIndex;
  }
  if(last<text.length) container.append(document.createTextNode(text.slice(last)));
}
/* Superscript reference that keeps prose readable; the full citation lives in a
   numbered footnote strip + a hover popover. */
function citeRef(label, unverified, reg){
  const src=srcByCitation(label);
  const key=src?(src.judgment_id||src.id||src.case_title):("u:"+label.toLowerCase());
  let entry=reg.byKey.get(key);
  if(!entry){ entry={num:reg.list.length+1, label, src, unverified}; reg.byKey.set(key,entry); reg.list.push(entry); }
  const over=src&&src.good===false, tone=over?"--bad":(src?"--good":"--warn");
  const span=el("span",{style:"position:relative;display:inline-block"});
  const b=el("button",{"aria-label":"Citation "+entry.num+": "+label,

async function askJudgment(){
  const q=S.judgmentAskDraft.trim();
  const id=S.selectedSource;
  if(!q||!id||S.judgmentAsking) return;
  S.judgmentAsking=true; S.judgmentAskAnswer=""; S.judgmentAskWarnings=[]; render();
  try{
    const resp=await fetch(API+"/judgments/"+id+"/ask",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({user_id:S.userId,message:q})});
    const reader=resp.body.getReader(); const dec=new TextDecoder(); let buf="";
    while(true){
      const {value,done}=await reader.read(); if(done)break;
      buf+=dec.decode(value,{stream:true});
      let nl; while((nl=buf.indexOf("\n"))>=0){
        const line=buf.slice(0,nl).trim(); buf=buf.slice(nl+1);
        if(!line)continue; let ev; try{ev=JSON.parse(line);}catch(e){continue;}
        if(ev.type==="token") S.judgmentAskAnswer+=ev.text;
        else if(ev.type==="final") S.judgmentAskWarnings=ev.warnings||[];
        render();
      }
    }
  }catch(e){
    S.judgmentAskAnswer+="\n\n[connection error: "+e.message+"]";
  }
  S.judgmentAsking=false; render();
}
function layout(nodes,edges){
  // radial: pick the highest-degree (or 'you'/'act') node as center.
  if(!nodes.length) return {nodes:[],edges:[]};
  const deg={}; nodes.forEach(n=>deg[n.id]=0);
  edges.forEach(e=>{deg[e.src]=(deg[e.src]||0)+1; deg[e.dst]=(deg[e.dst]||0)+1;});
  let center=nodes.find(n=>n.kind==='you'||n.kind==='act')||nodes.reduce((a,b)=>deg[b.id]>deg[a.id]?b:a,nodes[0]);
  const others=nodes.filter(n=>n.id!==center.id);
  const cx=180,cy=150,R=108;
  const pos={}; pos[center.id]={x:cx,y:cy};
  others.forEach((n,i)=>{ const ang=(2*Math.PI*i)/Math.max(1,others.length)-Math.PI/2;
    pos[n.id]={x:cx+R*Math.cos(ang), y:cy+R*Math.sin(ang)}; });
  return {pos, center, nodes, edges};
}
function renderGraph(){
  const g = S.corpusGraph || {nodes:[],edges:[]};
  if(!g.nodes||!g.nodes.length)
    return el("div",{style:"text-align:center;padding:30px 12px;font-size:13px;color:var(--ink-3);line-height:1.5"},
      "Select a source to see its citation graph.");
  const L=layout(g.nodes,g.edges); const P=pal();
  const ns="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(ns,"svg"); svg.setAttribute("viewBox","0 0 360 300");
  svg.setAttribute("style","width:100%;height:auto;display:block");
  // edges
  g.edges.forEach(e=>{ const a=L.pos[e.src],b=L.pos[e.dst]; if(!a||!b)return;
    const ln=document.createElementNS(ns,"line");
    ln.setAttribute("x1",a.x);ln.setAttribute("y1",a.y);ln.setAttribute("x2",b.x);ln.setAttribute("y2",b.y);
    ln.setAttribute("stroke",P.edge);ln.setAttribute("stroke-width","1.3");ln.setAttribute("stroke-opacity","0.85");
    svg.appendChild(ln); });
  // nodes
  g.nodes.forEach(n=>{ const p=L.pos[n.id]; if(!p)return;
    const grp=document.createElementNS(ns,"g"); grp.style.cursor="pointer";
    const isAct=n.kind==='act',over=n.kind==='over',fact=n.kind==='fact',you=n.kind==='you';
    const r=you?22:(isAct?20:15);
    let fill=P.jFill,stroke=P.jStroke,lc=P.label;
    if(isAct){fill=P.actFill;} else if(over){fill=P.overFill;stroke=P.overStroke;}
    else if(fact){fill=P.factFill;stroke=P.factStroke;} else if(you){fill=P.youFill;}
    const c=document.createElementNS(ns,"circle");
    c.setAttribute("cx",p.x);c.setAttribute("cy",p.y);c.setAttribute("r",r);
    c.setAttribute("fill",fill);c.setAttribute("stroke",stroke);c.setAttribute("stroke-width","1.6");
    grp.appendChild(c);
    const t1=document.createElementNS(ns,"text");
    t1.setAttribute("x",p.x);t1.setAttribute("y",you?p.y+4:p.y+r+12);t1.setAttribute("text-anchor","middle");
    t1.setAttribute("font-family","Nunito Sans");t1.setAttribute("font-size","9.5");t1.setAttribute("font-weight","700");
    t1.setAttribute("fill",you?P.youText:lc); t1.textContent=n.label; grp.appendChild(t1);
    if(n.sub){ const t2=document.createElementNS(ns,"text");
      t2.setAttribute("x",p.x);t2.setAttribute("y",p.y+r+22);t2.setAttribute("text-anchor","middle");
      t2.setAttribute("font-family","Nunito Sans");t2.setAttribute("font-size","8");t2.setAttribute("fill",P.sub);
      t2.textContent=n.sub; grp.appendChild(t2); }
    svg.appendChild(grp); });
  return svg;
}

function groupSessions(sessions){
  const out={Today:[],Yesterday:[],"This week":[],Older:[]};
  const now=new Date(); const startToday=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime(); const dayMs=86400000;
  sessions.forEach(s=>{
    const t=s.last_active_at?new Date(s.last_active_at).getTime():0;
    if(!t) out.Older.push(s);
    else if(t>=startToday) out.Today.push(s);
    else if(t>=startToday-dayMs) out.Yesterday.push(s);
    else if(t>=startToday-6*dayMs) out["This week"].push(s);
    else out.Older.push(s);
  });
  return out;
}

function authorityScore(meta){
  const rank={Supreme:5,"Supreme Court":5,"Privy Council":4,"High Court":3,Tribunal:1};
  const level=meta.court_level||meta.court_name||"";
  let score=Object.keys(rank).find(k=>String(level).includes(k));
  let base=score?rank[score]:2;
  const unanimous=JSON.stringify(meta.bench_detail||meta.unanimity_weight||"").toLowerCase().includes("unanim");
  if(unanimous) base+=1;
  const y=parseInt(String(meta.judgment_date||"").slice(0,4),10);
  if(y>=1947) base+=Math.min(1,(y-1947)/80);
  return Math.max(0,Math.min(8,base));
}

    last=re.lastIndex;

  return frag;
}

      el("span",{style:"width:7px;height:7px;border-radius:50%;background:var("+(over?"--bad":"--good")+")"}), over?"NO LONGER GOOD LAW":"GOOD LAW"),
    el("span",{style:"margin-left:auto;font-size:11.5px;color:var(--color-ink-tertiary);text-align:right"},src.courtdate||"")));

    onclick:()=>openJudgment(src)}, "→ Open judgment"));

}

/* ---------- actions ---------- */
function newSession(){ S.sessionId=null; S.messages=[]; S.sources=[]; S.warnings=[]; S.selectedSource=null; S.selectedJudgment=null; S.mobileNavOpen=false; render(); }
async function openSession(id){
  S.sessionId=id; S.sources=[]; S.warnings=[]; S.selectedSource=null; S.selectedJudgment=null; S.mobileNavOpen=false;
  try{ const data=await jget("/sessions/"+S.userId+"/"+id);
    S.messages=(data.messages||[]).filter(m=>m.role!=='recall').map(m=>({
      role:m.role, text:m.content, done:true, recalled:[],
      sources:m.sources||[], warnings:m.warnings||[]}));
    S.sources = data.sources || latestMessageSources(S.messages);
    S.selectedSource = S.sources.length ? sourceId(S.sources[0]) : null;
    const lastWarn = [...S.messages].reverse().find(m=>(m.warnings||[]).length);
    S.warnings = lastWarn ? lastWarn.warnings : [];
  }catch(e){ S.messages=[]; }
  render(); scrollThread();
}
function latestMessageSources(messages){
  const msg=[...messages].reverse().find(m=>(m.sources||[]).length);
  return msg ? msg.sources.filter(s=>s&&typeof s==="object") : [];
}
function switchUser(id){ S.userId=id; S.userMenuOpen=false; S.sessionId=null; S.messages=[]; S.sources=[]; S.warnings=[]; S.selectedSource=null; S.selectedJudgment=null; S.graphTab='citation'; render(); loadSidebar(); }
function fmtAgo(ts){ if(!ts)return""; const d=new Date(ts); const m=Math.round((Date.now()-d)/60000);
  if(m<1)return"just now"; if(m<60)return m+"m ago"; const h=Math.round(m/60); if(h<24)return h+"h ago"; return Math.round(h/24)+"d ago"; }
function currentTitle(){ const s=S.sessions.find(x=>x.id===S.sessionId); if(s)return s.title;
  return S.messages.length?(S.messages[0].text.slice(0,46)):"New Session"; }

/* ---------- Auth (sign in / sign up + Google OAuth) ---------- */
function setAuthUser(u){ S.authUser=u||null; if(u&&u.id) S.userId=u.id; }
function switchAuthMode(m){ S.authMode=m; S.authError=""; render(); }
function authErr(data){
  if(!data) return "";
  if(typeof data.error==="string") return data.error;
  if(Array.isArray(data.detail)) return data.detail.map(d=>(d&&d.msg)||"").filter(Boolean).join(" ");
  if(typeof data.detail==="string") return data.detail;
  return "";
}
async function fetchProviders(){
  try{
    const r=await fetch(API+"/auth/providers");
    if(r.ok){ const p=await r.json();
      S.googleEnabled=!!p.google; S.clerkEnabled=!!p.clerk;
      S.clerkPk=p.clerk_publishable_key||""; S.clerkFrontendApi=p.clerk_frontend_api||"";
    }
  }catch(e){}
}
async function refreshMe(){
  try{ const r=await fetch(API+"/auth/me"); if(r.ok){ const d=await r.json(); setAuthUser(d.user); } }
  catch(e){}
  S.authChecked=true;
}
/* ---- Clerk: load the SDK, finish the OAuth redirect, exchange for our cookie ---- */
function loadClerkScript(){
  return new Promise((resolve,reject)=>{
    if(window.Clerk){ resolve(); return; }
    if(!S.clerkFrontendApi||!S.clerkPk){ reject(new Error("clerk not configured")); return; }
    const sc=document.createElement("script");
    sc.async=true; sc.setAttribute("crossorigin","anonymous");
    sc.setAttribute("data-clerk-publishable-key",S.clerkPk);
    sc.src="https://"+S.clerkFrontendApi+"/npm/@clerk/clerk-js@5/dist/clerk.browser.js";
    let done=false;
    const to=setTimeout(()=>{ if(!done){ done=true; reject(new Error("clerk load timeout")); } },7000);
    sc.onload=()=>{ if(!done){ done=true; clearTimeout(to); resolve(); } };
    sc.onerror=()=>{ if(!done){ done=true; clearTimeout(to); reject(new Error("failed to load Clerk")); } };
    document.head.appendChild(sc);
  });
}
async function initClerk(){
  const onCallback=/\/sso-callback\/?$/.test(location.pathname);
  if(onCallback){ S.clerkBusy=true; render(); }
  try{
    await loadClerkScript();
    if(!window.Clerk) return;
    await window.Clerk.load();
    if(onCallback){
      try{ await window.Clerk.handleRedirectCallback({}); }catch(e){}
      // handleRedirectCallback navigates to redirectUrlComplete ("/"). If it
      // didn't, fall through and try to exchange whatever session we have.
    }
    if(window.Clerk.user && window.Clerk.session){
      const token=await window.Clerk.session.getToken();
      if(token) await exchangeClerk(token);
    }
  }catch(e){ /* Clerk is optional; email/password still works */ }
  finally{ S.clerkBusy=false; }
}
async function exchangeClerk(token){
  try{
    const r=await fetch(API+"/auth/clerk",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token})});
    let d={}; try{ d=await r.json(); }catch(e){}
    if(r.ok && d.user){ setAuthUser(d.user); }
    else if(!r.ok){ S.authError=authErr(d)||"Could not complete Google sign-in."; }
  }catch(e){ S.authError="Could not reach the server to finish sign-in."; }
}
function clerkGoogle(){
  if(!window.Clerk || !window.Clerk.client){ S.authError="Google sign-in is still loading — try again in a moment."; render(); return; }
  const back=location.origin+"/sso-callback", done=location.origin+"/";
  try{
    window.Clerk.client.signIn.authenticateWithRedirect({strategy:"oauth_google", redirectUrl:back, redirectUrlComplete:done})
      .catch(err=>{ S.authError="Could not start Google sign-in: "+((err&&err.message)||err); render(); });
  }catch(err){ S.authError="Could not start Google sign-in."; render(); }
}
async function doAuth(){
  if(S.authBusy) return;
  const mode=S.authMode, email=(S.authEmail||"").trim();
  if(!email||!S.authPassword){ S.authError="Enter your email and password."; render(); return; }
  if(mode==="signup"&&S.authPassword.length<8){ S.authError="Password must be at least 8 characters."; render(); return; }
  S.authError=""; S.authBusy=true; render();
  try{
    const body=mode==="signup"?{email,password:S.authPassword,name:(S.authName||"").trim()}:{email,password:S.authPassword};
    const r=await fetch(API+"/auth/"+(mode==="signup"?"signup":"login"),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    let data={}; try{ data=await r.json(); }catch(e){}
    if(!r.ok){ S.authError=authErr(data)||("Request failed ("+r.status+")"); S.authBusy=false; render(); return; }
    setAuthUser(data.user); S.authBusy=false; S.authPassword=""; S.authError="";
    render(); loadSidebar(); refreshGraphForSelection();
  }catch(e){ S.authError="Network error. Is the server running?"; S.authBusy=false; render(); }
}
async function doLogout(){
  try{ await fetch(API+"/auth/logout",{method:"POST"}); }catch(e){}
  S.authUser=null; S.userId=null; S.userMenuOpen=false; S.messages=[]; S.sessions=[];
  S.sources=[]; S.sessionId=null; S.selectedJudgment=null; S.sourcesDrawerOpen=false; S.authMode="login"; render();
}
function googleLogin(){ if(S.googleEnabled) location.href=API+"/auth/google/login"; }
function googleG(){
  const s='<svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.76h3.56c2.08-1.92 3.28-4.74 3.28-8.09Z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.56-2.76c-.98.66-2.23 1.06-3.72 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23Z"/><path fill="#FBBC05" d="M5.84 14.11a6.6 6.6 0 0 1 0-4.22V7.05H2.18a11 11 0 0 0 0 9.9l3.66-2.84Z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.05l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38Z"/></svg>';
  const d=el("span",{style:"display:inline-flex;flex:none"}); d.innerHTML=s; return d.firstChild;
}
function authScreen(){
  const signup=S.authMode==="signup";
  const shell=el("div",{style:"flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px"});
  if(S.clerkBusy){
    shell.append(el("div",{class:"fade-up",style:"display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center"},
      el("div",{style:"width:48px;height:48px;border-radius:13px;background:var(--color-brand-navy);display:flex;align-items:center;justify-content:center"},ICON(I.scales,{w:26,stroke:"#fff",sw:1.7})),
      el("div",{class:"serif",style:"font-size:19px;font-weight:600"},"Completing sign-in…"),
      el("div",{style:"font-size:13px;color:var(--color-ink-tertiary)"},"One moment while we finish signing you in.")));
    return shell;
  }
  const card=el("div",{class:"fade-up",style:"width:100%;max-width:400px;background:var(--color-surface);border:1px solid var(--color-divider);border-radius:18px;box-shadow:0 24px 60px rgba(0,0,0,.10);padding:30px 28px;display:flex;flex-direction:column;gap:16px"});
  card.append(el("div",{style:"display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center"},
    el("div",{style:"width:48px;height:48px;border-radius:13px;background:var(--color-brand-navy);display:flex;align-items:center;justify-content:center"},ICON(I.scales,{w:26,stroke:"#fff",sw:1.7})),
    el("div",{},
      el("div",{class:"serif",style:"font-weight:600;font-size:24px;letter-spacing:-.01em",html:'Nyaya<span style="color:var(--accent-ink)">.AI</span>'}),
      el("div",{style:"font-size:13px;color:var(--color-ink-secondary);margin-top:4px"}, signup?"Create your account":"Sign in to your legal memory"))));
  const googleReady = S.clerkEnabled || S.googleEnabled;
  const onGoogle = S.clerkEnabled ? clerkGoogle : googleLogin;
  const g=el("button",{class:"tap","aria-label":"Continue with Google",disabled:googleReady?null:"",
    title:googleReady?"Sign in with Google"+(S.clerkEnabled?" (via Clerk)":""):"Configure Clerk or Google to enable Google sign-in",
    style:"display:flex;align-items:center;justify-content:center;gap:10px;height:44px;border:1px solid var(--color-divider);border-radius:11px;background:var(--color-surface);color:var(--color-ink);font-weight:600;font-size:14px;cursor:"+(googleReady?"pointer":"not-allowed")+";opacity:"+(googleReady?"1":".55"),
    onclick:onGoogle}, googleG(), "Continue with Google");
  card.append(g);
  if(!googleReady) card.append(el("div",{style:"font-size:11px;color:var(--color-ink-tertiary);text-align:center;margin-top:-6px"},"Google sign-in activates once Clerk (or Google) is configured."));
  card.append(el("div",{style:"display:flex;align-items:center;gap:10px;color:var(--color-ink-tertiary);font-size:12px"},
    el("span",{style:"flex:1;height:1px;background:var(--color-divider)"}),"or",el("span",{style:"flex:1;height:1px;background:var(--color-divider)"})));
  const form=el("div",{style:"display:flex;flex-direction:column;gap:12px"});
  const mkField=(label,type,key,ph,autofill)=>{

      style:"width:100%;border:1px solid var(--color-divider);border-radius:11px;padding:11px 13px;font-size:14px;background:var(--color-surface);color:var(--color-ink);outline:none",
      oninput:e=>{S[key]=e.target.value;},
      onkeydown:e=>{ if(e.key==="Enter") doAuth(); }});
    return el("label",{style:"display:flex;flex-direction:column;gap:6px"},
      el("span",{style:"font-size:12px;font-weight:600;color:var(--color-ink-secondary)"},label), inp);
  };
  if(signup) form.append(mkField("Name","text","authName","Your name","name"));
  form.append(mkField("Email","email","authEmail","you@example.com","email"));
  form.append(mkField("Password","password","authPassword",signup?"At least 8 characters":"Your password",signup?"new-password":"current-password"));
  card.append(form);
  if(S.authError) card.append(el("div",{style:"font-size:12.5px;color:var(--bad);background:var(--bad-bg);border:1px solid var(--bad-bd);border-radius:9px;padding:9px 11px;line-height:1.4"},S.authError));
  card.append(el("button",{class:"tap",disabled:S.authBusy?"":null,
    style:"height:46px;border:0;border-radius:11px;background:var(--color-brand-gold);color:var(--color-brand-navy);font-weight:700;font-size:15px;transition:opacity .15s ease;cursor:"+(S.authBusy?"default":"pointer")+";opacity:"+(S.authBusy?".7":"1"),
    onclick:doAuth}, S.authBusy?"Please wait…":(signup?"Create account":"Sign in")));
  card.append(el("div",{style:"text-align:center;font-size:13px;color:var(--color-ink-secondary)"},

/* ---------- boot ---------- */
document.addEventListener("keydown",e=>{ if(e.key!=="Escape") return;
  if(S.selectedJudgment||S.judgmentLoading){ closeJudgment(); return; }
  if(S.sourcesDrawerOpen||S.userMenuOpen||S.sessionMenuId!=null||S.mobileNavOpen){
    S.sourcesDrawerOpen=false; S.userMenuOpen=false; S.sessionMenuId=null; S.mobileNavOpen=false; render(); }
});
// re-render only when crossing the mobile breakpoint (rotation / resize)
let _rzT=null, _wasMobile=isMobile();
window.addEventListener("resize",()=>{
  clearTimeout(_rzT);
  _rzT=setTimeout(()=>{ const m=isMobile(); if(m!==_wasMobile){ _wasMobile=m; if(!m) S.mobileNavOpen=false; if(S.authUser) render(); } },150);
});
async function boot(){
  try{ const p=new URLSearchParams(location.search); const ae=p.get("auth_error");
    if(ae){ S.authError=ae; history.replaceState({},document.title,location.pathname); } }catch(e){}
  render();                         // paint the sign-in screen immediately — never a blank canvas
  await fetchProviders();
  await refreshMe();                // already signed in? show the app right away
  if(!S.authUser && S.clerkEnabled){ await initClerk(); await refreshMe(); }
  S.clerkBusy=false;
  render();
  if(S.authUser){ loadSidebar(); refreshGraphForSelection(); }
}
boot();
